<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizer Test</title>
    <style>
        body { margin: 0; padding: 20px; background: #1e1e1e; font-family: monospace; }
        #canvas-container { width: 100%; height: 500px; background: #111; margin-bottom: 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div>
        <button onclick="loadTest()">Load Test Data</button>
        <button onclick="play()">▶ Play</button>
        <button onclick="pause()">⏸ Pause</button>
        <button onclick="stepForward()">⏭ Next</button>
        <button onclick="stepBackward()">⏮ Prev</button>
        <button onclick="reset()">Reset</button>
    </div>

    <script type="module">
        import { loadCommands, play, pause, stepForward, stepBackward, reset, getEngine } from './src/visualizer/visualizerEngine.ts';

        window.loadTest = () => {
            const commands = [
                {"key":"log","method":"LogTracer","args":["Console"]},
                {"key":"arr","method":"Array1DTracer","args":["Array"]},
                {"key":"layout","method":"VerticalLayout","args":[["arr","log"]]},
                {"key":null,"method":"setRoot","args":["layout"]},
                {"key":"arr","method":"set","args":[[38,27,43,3,9]]},
                {"key":null,"method":"delay","args":[]},
                {"key":"log","method":"println","args":["Starting sort..."]},
                {"key":null,"method":"delay","args":[]},
                {"key":"arr","method":"select","args":[0]},
                {"key":null,"method":"delay","args":[]},
                {"key":"log","method":"println","args":["Comparing index 0"]},
                {"key":null,"method":"delay","args":[]},
                {"key":"arr","method":"deselect","args":[0]},
                {"key":"arr","method":"select","args":[1]},
                {"key":null,"method":"delay","args":[]},
                {"key":"arr","method":"patch","args":[0,27]},
                {"key":null,"method":"delay","args":[]},
                {"key":"log","method":"println","args":["Swapped to index 0!"]},
                {"key":null,"method":"delay","args":[]},
                {"key":"arr","method":"deselect","args":[1]},
                {"key":"arr","method":"patch","args":[1,38]},
                {"key":null,"method":"delay","args":[]},
                {"key":"log","method":"println","args":["Swapped to index 1!"]},
                {"key":null,"method":"delay","args":[]},
            ];
            loadCommands(commands);
            console.log('Test data loaded');
        };

        window.play = play;
        window.pause = pause;
        window.stepForward = stepForward;
        window.stepBackward = stepBackward;
        window.reset = reset;

        // Mount engine
        const container = document.getElementById('canvas-container');
        const engine = getEngine();
        engine.mount(container);
        
        console.log('Visualizer ready. Click "Load Test Data" to start.');
    </script>
</body>
</html>
