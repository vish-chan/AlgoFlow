<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Notepad body -->
  <rect x="10" y="6" width="44" height="52" rx="4" fill="#1e1e1e" stroke="#666" stroke-width="2"/>
  <!-- Notepad top binding -->
  <rect x="10" y="6" width="44" height="10" rx="4" fill="#333" stroke="#666" stroke-width="2"/>
  <!-- Ruled lines -->
  <line x1="16" y1="28" x2="48" y2="28" stroke="#333" stroke-width="1"/>
  <line x1="16" y1="38" x2="48" y2="38" stroke="#333" stroke-width="1"/>
  <line x1="16" y1="48" x2="48" y2="48" stroke="#333" stroke-width="1"/>
  <!-- Graph edges -->
  <line x1="22" y1="24" x2="42" y2="24" stroke="#4CAF50" stroke-width="2"/>
  <line x1="22" y1="24" x2="22" y2="44" stroke="#4CAF50" stroke-width="2"/>
  <line x1="42" y1="24" x2="42" y2="44" stroke="#4CAF50" stroke-width="2"/>
  <line x1="22" y1="44" x2="42" y2="44" stroke="#4CAF50" stroke-width="2"/>
  <line x1="22" y1="24" x2="42" y2="44" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Graph nodes -->
  <circle cx="22" cy="24" r="4.5" fill="#4CAF50"/>
  <circle cx="42" cy="24" r="4.5" fill="#4CAF50"/>
  <circle cx="22" cy="44" r="4.5" fill="#2196F3"/>
  <circle cx="42" cy="44" r="4.5" fill="#4CAF50"/>
</svg>
