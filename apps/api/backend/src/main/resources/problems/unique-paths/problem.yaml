id: 60
title: Unique Paths
difficulty: Medium
category: Dynamic Programming
leetcodeUrl: https://leetcode.com/problems/unique-paths/
description: >
  A robot is located at the top-left corner of an m x n grid. It can only move either down or
  right at any point. How many possible unique paths are there to the bottom-right corner?
examples:
  - "Input: m = 3, n = 7 → Output: 28"
  - "Input: m = 3, n = 2 → Output: 3"
