id: 71
title: Insert Interval
difficulty: Medium
category: Intervals
leetcodeUrl: https://leetcode.com/problems/insert-interval/
description: >
  Given a set of non-overlapping intervals sorted by start time and a new interval, insert the
  new interval and merge if necessary. Return the result sorted by start time.
examples:
  - "Input: intervals = [[1,3],[6,9]], newInterval = [2,5] → Output: [[1,5],[6,9]]"
